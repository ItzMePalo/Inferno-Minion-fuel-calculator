<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Inferno Fuel Calculator</title>

  <!-- React -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel (THIS is the fix) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body style="margin:0;">
  <div id="root"></div>

  <script type="text/babel">

// ===== PASTE YOUR CODE BELOW THIS LINE (UNCHANGED) =====

const { useState, useMemo, useCallback } = React;

// ─── CRAFT CHAIN CONSTANTS ───────────────────────────────────────────────────
// Gabagool ladder:
//   24 Crude Gabagool + 1 Sulphuric Coal → 1 Fuel Gabagool
//   24 Fuel Gabagool + 1 Sulphuric Coal → 1 Heavy Gabagool
//   12 Heavy Gabagool + 1 Sulphuric Coal → 1 Hypergolic Gabagool
//
// So per 1 Hypergolic Gabagool:
//   Fuel Gabagool needed : 12 × 24 = 288
//   Crude Gabagool needed: 288 × 24 = 6,912
//   Sulphuric Coal needed: 288 (for Fuel Gabagool step)
//                        + 12 (for Heavy Gabagool step)
//                        + 1  (for Hypergolic step)
//                        = 301
//
// Per 1 Inferno Minion Fuel (Legendary ×20, Gabagool Distillate):
//   6 Gabagool Distillates + 2 Inferno Fuel Blocks + 1 Hypergolic Gabagool
//
// Sulphuric Coal breakdown:
//   1 craft of Sulphuric Coal yields 4 Sulphuric Coal
//   Recipe: 4 Enchanted Coal + 1 Enchanted Sulphur → 4 Sulphuric Coal
//   So per 1 Sulphuric Coal you need:
//     1 Enchanted Coal       (4 per craft ÷ 4 output = 1 Enchanted Coal per Sulphuric Coal)
//     0.25 Enchanted Sulphur (1 per craft ÷ 4 output = 0.25 per Sulphuric Coal)
//   Enchanted Coal = 160 raw Coal each
//   Enchanted Sulphur = 160 raw Sulphur each
//   So per 1 Sulphuric Coal:
//     1 Enchanted Coal        = 160 raw Coal
//     0.25 Enchanted Sulphur  = 40  raw Sulphur

const CRUDE_GABAGOOL_PER_FUEL_GABAGOOL = 24;
const FUEL_GABAGOOL_PER_HEAVY_GABAGOOL = 24;
const HEAVY_GABAGOOL_PER_HYPERGOLIC = 12;
const CRUDE_GABAGOOL_PER_VERY_CRUDE_GABAGOOL = 192;
const FUEL_GABAGOOL_FROM_ONE_VERY_CRUDE = 8; // 1 Very Crude Gabagool + 8 Sulphuric Coal → 8 Fuel Gabagool

const SULPHURIC_COAL_PER_FUEL_GABAGOOL_CRAFT = 1;
const SULPHURIC_COAL_PER_HEAVY_GABAGOOL_CRAFT = 1;
const SULPHURIC_COAL_PER_HYPERGOLIC_CRAFT = 1;

const FUEL_GABAGOOL_NEEDED_PER_HYPERGOLIC = HEAVY_GABAGOOL_PER_HYPERGOLIC * FUEL_GABAGOOL_PER_HEAVY_GABAGOOL; // 288
const CRUDE_GABAGOOL_PER_HYPERGOLIC = FUEL_GABAGOOL_NEEDED_PER_HYPERGOLIC * CRUDE_GABAGOOL_PER_FUEL_GABAGOOL; // 6,912
const SULPHURIC_COAL_PER_HYPERGOLIC =
  FUEL_GABAGOOL_NEEDED_PER_HYPERGOLIC * SULPHURIC_COAL_PER_FUEL_GABAGOOL_CRAFT
  + HEAVY_GABAGOOL_PER_HYPERGOLIC * SULPHURIC_COAL_PER_HEAVY_GABAGOOL_CRAFT
  + SULPHURIC_COAL_PER_HYPERGOLIC_CRAFT; // 301

const DISTILLATES_PER_FUEL = 6;
const INFERNO_FUEL_BLOCKS_PER_FUEL = 2;
const INFERNO_FUEL_BLOCK_BITS_COST = 75;

// Sulphuric Coal craft yields 4 per recipe
const SULPHURIC_COAL_PER_RECIPE_OUTPUT = 4;
const ENCHANTED_COAL_PER_SULPHURIC_COAL_RECIPE = 4;
const ENCHANTED_SULPHUR_PER_SULPHURIC_COAL_RECIPE = 1;
// Per single Sulphuric Coal:
const ENCHANTED_COAL_PER_SULPHURIC_COAL = ENCHANTED_COAL_PER_SULPHURIC_COAL_RECIPE / SULPHURIC_COAL_PER_RECIPE_OUTPUT; // 1.0
const ENCHANTED_SULPHUR_PER_SULPHURIC_COAL = ENCHANTED_SULPHUR_PER_SULPHURIC_COAL_RECIPE / SULPHURIC_COAL_PER_RECIPE_OUTPUT; // 0.25
const RAW_COAL_PER_ENCHANTED_COAL = 160;
const RAW_SULPHUR_PER_ENCHANTED_SULPHUR = 160;
// Per single Sulphuric Coal in raw mats:
const RAW_COAL_PER_SULPHURIC_COAL = ENCHANTED_COAL_PER_SULPHURIC_COAL * RAW_COAL_PER_ENCHANTED_COAL; // 160
const RAW_SULPHUR_PER_SULPHURIC_COAL = ENCHANTED_SULPHUR_PER_SULPHURIC_COAL * RAW_SULPHUR_PER_ENCHANTED_SULPHUR; // 40

// ─── BAZAAR API KEYS ─────────────────────────────────────────────────────────
const BAZAAR_KEYS = {
  crudeGabagool:        "CRUDE_GABAGOOL",
  veryCrudeGabagool:    "VERY_CRUDE_GABAGOOL",
  sulphuricCoal:        "SULPHURIC_COAL",
  enchantedCoal:        "ENCHANTED_COAL",
  enchantedSulphur:     "ENCHANTED_SULPHUR",
  rawCoal:              "COAL",
  rawSulphur:           "SULPHUR",
  gabagoolDistillate:   "GABAGOOL_DISTILLATE",
  // Inferno Fuel Block is Bits Shop only — not on Bazaar
};

function fmt(n) {
  if (n === 0) return "0";
  return Math.floor(n).toLocaleString();
}
function fmtDec(n, dec = 2) {
  if (n === 0) return "0";
  return n.toLocaleString(undefined, { maximumFractionDigits: dec });
}
function p(s) { return parseFloat(s) || 0; }

// ─── UI COMPONENTS ───────────────────────────────────────────────────────────
function InfoRow({ label, value, sub, highlight, muted, indent }) {
  return (
    <div style={{
      display: "flex", justifyContent: "space-between", alignItems: "center",
      padding: indent ? "6px 12px 6px 24px" : "7px 12px",
      background: highlight ? "rgba(255,100,0,0.12)" : muted ? "rgba(0,0,0,0.15)" : "rgba(255,255,255,0.03)",
      borderRadius: 8,
      borderLeft: highlight ? "3px solid #ff6a00" : muted ? "3px solid rgba(255,255,255,0.04)" : "3px solid transparent",
      marginBottom: 4,
    }}>
      <span style={{ color: muted ? "#605040" : "#b0a89a", fontSize: muted ? 12 : 13 }}>{label}</span>
      <div style={{ textAlign: "right" }}>
        <span style={{ color: highlight ? "#ffb347" : muted ? "#7a6050" : "#f0e8dc", fontFamily: "'Courier New', monospace", fontWeight: 700, fontSize: muted ? 12 : 14 }}>{value}</span>
        {sub && <div style={{ color: "#666", fontSize: 10, marginTop: 1 }}>{sub}</div>}
      </div>
    </div>
  );
}

function SectionHeader({ children, icon, color }) {
  return (
    <div style={{
      display: "flex", alignItems: "center", gap: 7,
      margin: "18px 0 9px",
      borderBottom: `1px solid ${color || "rgba(255,106,0,0.18)"}`,
      paddingBottom: 5,
    }}>
      <span style={{ fontSize: 14 }}>{icon}</span>
      <span style={{ color: color ? "#ffcc55" : "#ff9f4a", fontWeight: 700, fontSize: 11, letterSpacing: "0.09em", textTransform: "uppercase" }}>{children}</span>
    </div>
  );
}

function Card({ children, accent, style: extraStyle }) {
  return (
    <div style={{
      background: "rgba(255,255,255,0.02)",
      border: `1px solid ${accent || "rgba(255,106,0,0.18)"}`,
      borderRadius: 14, padding: 20, marginBottom: 12,
      ...extraStyle,
    }}>
      {children}
    </div>
  );
}

function CardHeader({ icon, title, accent }) {
  return (
    <div style={{
      display: "flex", alignItems: "center", gap: 7, marginBottom: 14,
      borderBottom: `1px solid ${accent || "rgba(255,106,0,0.12)"}`,
      paddingBottom: 8,
    }}>
      <span>{icon}</span>
      <span style={{ color: accent ? "#ffcc55" : "#ff9f4a", fontWeight: 700, fontSize: 12, letterSpacing: "0.08em", textTransform: "uppercase" }}>{title}</span>
    </div>
  );
}

function Divider() {
  return <div style={{ borderTop: "1px solid rgba(255,255,255,0.05)", margin: "8px 0" }} />;
}

// ─── MAIN COMPONENT ──────────────────────────────────────────────────────────
function InfernoFuelCalculator() {  
  // Stock inputs
  const [crudeGabagoolOwned, setCrudeGabagoolOwned]           = useState("");
  const [veryCrudeGabagoolOwned, setVeryCrudeGabagoolOwned]   = useState("");
  const [distillatesOwned, setDistillatesOwned]               = useState("");
  const [infernoFuelBlocksOwned, setInfernoFuelBlocksOwned]   = useState("");
  const [numberOfMinions, setNumberOfMinions]                 = useState("10");

  // Manual price inputs (coins each)
  const [priceSulphuricCoal, setPriceSulphuricCoal]           = useState("");
  const [priceEnchantedCoal, setPriceEnchantedCoal]           = useState("");
  const [priceEnchantedSulphur, setPriceEnchantedSulphur]     = useState("");
  const [priceRawCoal, setPriceRawCoal]                       = useState("");
  const [priceRawSulphur, setPriceRawSulphur]                 = useState("");
  const [priceGabagoolDistillate, setPriceGabagoolDistillate] = useState("");
  const [priceInfernoFuelBlock, setPriceInfernoFuelBlock]      = useState("");

  // Bazaar fetch state
  const [fetchStatus, setFetchStatus] = useState("idle"); // idle | loading | ok | error
  const [fetchMessage, setFetchMessage] = useState("");
  const [lastFetchTime, setLastFetchTime] = useState(null);

  // ── LIVE BAZAAR FETCH (same pattern as Shard Flip Calculator) ──
  const fetchLivePrices = useCallback(async () => {
    setFetchStatus("loading");
    setFetchMessage("Connecting to Hypixel Bazaar API…");
    try {
      const res = await fetch("https://api.hypixel.net/v2/skyblock/bazaar");
      if (!res.ok) throw new Error("HTTP " + res.status);
      const data = await res.json();
      if (!data.success) throw new Error("API returned success: false");

      const products = data.products;
      let updatedCount = 0;

      // Helper: instasell price = sell_summary[0].pricePerUnit (what buyers pay you → use for items you're SELLING)
      //         instabuy price  = buy_summary[0].pricePerUnit  (what you pay to buy instantly → use for items you're BUYING)
      // For ingredients we're BUYING, use instabuy (buy_summary) = higher price
      // For items we SELL, use instasell (sell_summary)
      function getBuyOrderPrice(key) {
        const prod = products[key];
        if (!prod) return 0;
        if (prod.sell_summary && prod.sell_summary.length > 0) return prod.sell_summary[0].pricePerUnit;
        if (prod.quick_status?.buyPrice) return prod.quick_status.buyPrice;
        return 0;
      }

      // Sulphuric Coal — we're buying it
      const sulphuricCoalPrice = getBuyOrderPrice(BAZAAR_KEYS.sulphuricCoal);
      if (sulphuricCoalPrice > 0) { setPriceSulphuricCoal(Math.round(sulphuricCoalPrice).toString()); updatedCount++; }

      // Enchanted Coal — we're buying it
      const enchantedCoalPrice = getBuyOrderPrice(BAZAAR_KEYS.enchantedCoal);
      if (enchantedCoalPrice > 0) { setPriceEnchantedCoal(Math.round(enchantedCoalPrice).toString()); updatedCount++; }

      // Enchanted Sulphur — we're buying it
      const enchantedSulphurPrice = getBuyOrderPrice(BAZAAR_KEYS.enchantedSulphur);
      if (enchantedSulphurPrice > 0) { setPriceEnchantedSulphur(Math.round(enchantedSulphurPrice).toString()); updatedCount++; }

      // Raw Coal — we're buying it
      const rawCoalPrice = getBuyOrderPrice(BAZAAR_KEYS.rawCoal);
      if (rawCoalPrice > 0) { setPriceRawCoal(rawCoalPrice.toFixed(1)); updatedCount++; }

      // Raw Sulphur — we're buying it
      const rawSulphurPrice = getBuyOrderPrice(BAZAAR_KEYS.rawSulphur);
      if (rawSulphurPrice > 0) { setPriceRawSulphur(rawSulphurPrice.toFixed(1)); updatedCount++; }

      // Gabagool Distillate — we're buying it
      const gabagoolDistillatePrice = getBuyOrderPrice(BAZAAR_KEYS.gabagoolDistillate);
      if (gabagoolDistillatePrice > 0) { setPriceGabagoolDistillate(Math.round(gabagoolDistillatePrice).toString()); updatedCount++; }

      // Note: Crude Gabagool and Very Crude Gabagool are produced by your minions, not bought.
      // Inferno Fuel Block is Bits Shop only — not on Bazaar. User enters coin value manually.

      const now = new Date();
      setLastFetchTime(`${now.getHours()}:${String(now.getMinutes()).padStart(2, "0")}:${String(now.getSeconds()).padStart(2, "0")}`);
      setFetchStatus("ok");
      setFetchMessage(`✓ Updated ${updatedCount} prices from Bazaar`);
    } catch (err) {
      setFetchStatus("error");
      setFetchMessage("✗ " + err.message);
    }
  }, []);

  // ── CALCULATIONS ──
  const calc = useMemo(() => {
    const crudeOwned    = parseInt(crudeGabagoolOwned)       || 0;
    const veryCrudeOwned = parseInt(veryCrudeGabagoolOwned)  || 0;
    const distOwned     = parseInt(distillatesOwned)          || 0;
    const blocksOwned   = parseInt(infernoFuelBlocksOwned)    || 0;
    const target        = parseInt(numberOfMinions)           || 10;

    // Convert all Crude Gabagool to equivalent (Very Crude Gabagool → Crude Gabagool)
    const crudeFromVeryCrude = veryCrudeOwned * CRUDE_GABAGOOL_PER_VERY_CRUDE_GABAGOOL;
    const totalCrudeEquivalent = crudeOwned + crudeFromVeryCrude;

    // How many Hypergolic Gabagool can we craft from our gabagool stock?
    const hypergolicCraftable = Math.floor(totalCrudeEquivalent / CRUDE_GABAGOOL_PER_HYPERGOLIC);

    // Limiting factors
    const distEntered   = distillatesOwned !== "";
    const blocksEntered = infernoFuelBlocksOwned !== "";

    const fuelsFromGabagool    = hypergolicCraftable;
    const fuelsFromDistillates = distEntered  ? Math.floor(distOwned / DISTILLATES_PER_FUEL)           : hypergolicCraftable;
    const fuelsFromBlocks      = blocksEntered ? Math.floor(blocksOwned / INFERNO_FUEL_BLOCKS_PER_FUEL) : hypergolicCraftable;

    const maxFuelsCraftable = Math.min(fuelsFromGabagool, fuelsFromDistillates, fuelsFromBlocks);
    const shortfall         = Math.max(0, target - maxFuelsCraftable);
    const canFuelAllMinions = maxFuelsCraftable >= target;

    // Sulphuric Coal totals for the target number of fuels
    const totalSulphuricCoalNeeded = target * SULPHURIC_COAL_PER_HYPERGOLIC;

    // Sulphuric Coal breakdown
    const totalEnchantedCoalNeeded    = totalSulphuricCoalNeeded * ENCHANTED_COAL_PER_SULPHURIC_COAL;       // = totalSulphuricCoalNeeded × 1
    const totalEnchantedSulphurNeeded = totalSulphuricCoalNeeded * ENCHANTED_SULPHUR_PER_SULPHURIC_COAL;    // = totalSulphuricCoalNeeded × 0.25
    const totalRawCoalNeeded          = totalEnchantedCoalNeeded * RAW_COAL_PER_ENCHANTED_COAL;             // × 160
    const totalRawSulphurNeeded       = totalEnchantedSulphurNeeded * RAW_SULPHUR_PER_ENCHANTED_SULPHUR;    // × 160

    // Other items needed for target number of fuels
    const totalDistillatesNeeded    = target * DISTILLATES_PER_FUEL;
    const totalFuelBlocksNeeded     = target * INFERNO_FUEL_BLOCKS_PER_FUEL;
    const extraDistillatesNeeded    = distEntered  ? Math.max(0, totalDistillatesNeeded - distOwned)  : totalDistillatesNeeded;
    const extraFuelBlocksNeeded     = blocksEntered ? Math.max(0, totalFuelBlocksNeeded - blocksOwned) : totalFuelBlocksNeeded;

    // ── Cost calculations ──
    const pSC    = p(priceSulphuricCoal);
    const pEC    = p(priceEnchantedCoal);
    const pES    = p(priceEnchantedSulphur);
    const pRC    = p(priceRawCoal);
    const pRS    = p(priceRawSulphur);
    const pDist  = p(priceGabagoolDistillate);
    const pBlock = p(priceInfernoFuelBlock);

    // Three routes for Sulphuric Coal:
    const costSulphuricCoalDirect       = totalSulphuricCoalNeeded * pSC;
    const costSulphuricCoalFromEnchanted = totalEnchantedCoalNeeded * pEC + totalEnchantedSulphurNeeded * pES;
    const costSulphuricCoalFromRaw       = totalRawCoalNeeded * pRC + totalRawSulphurNeeded * pRS;

    // Other costs (always the same regardless of Sulphuric Coal route)
    const costDistillates  = !distEntered  ? extraDistillatesNeeded * pDist  : 0;
    const costFuelBlocks   = !blocksEntered ? extraFuelBlocksNeeded * pBlock  : 0;
    const otherCosts       = costDistillates + costFuelBlocks;

    // Total cost per route
    const totalCostBuyingSulphuricCoalDirect        = costSulphuricCoalDirect + otherCosts;
    const totalCostCraftingFromEnchantedMaterials   = costSulphuricCoalFromEnchanted + otherCosts;
    const totalCostCraftingFromRawMaterials          = costSulphuricCoalFromRaw + otherCosts;

    // Cheapest route (only among routes where the user has entered prices)
    const availableRoutes = [];
    if (pSC > 0) availableRoutes.push({ label: "Buy Sulphuric Coal directly",          cost: totalCostBuyingSulphuricCoalDirect });
    if (pEC > 0 || pES > 0) availableRoutes.push({ label: "Craft Sulphuric Coal from Enchanted mats", cost: totalCostCraftingFromEnchantedMaterials });
    if (pRC > 0 || pRS > 0) availableRoutes.push({ label: "Craft Sulphuric Coal from raw mats",       cost: totalCostCraftingFromRawMaterials });
    const cheapestRoute = availableRoutes.length > 0
      ? availableRoutes.reduce((a, b) => a.cost <= b.cost ? a : b)
      : null;

    return {
      crudeOwned, veryCrudeOwned, crudeFromVeryCrude, totalCrudeEquivalent,
      hypergolicCraftable, maxFuelsCraftable, shortfall, target, canFuelAllMinions,
      totalSulphuricCoalNeeded,
      totalEnchantedCoalNeeded, totalEnchantedSulphurNeeded,
      totalRawCoalNeeded, totalRawSulphurNeeded,
      totalDistillatesNeeded, totalFuelBlocksNeeded,
      extraDistillatesNeeded, extraFuelBlocksNeeded,
      distEntered, blocksEntered,
      costSulphuricCoalDirect, costSulphuricCoalFromEnchanted, costSulphuricCoalFromRaw,
      costDistillates, costFuelBlocks, otherCosts,
      totalCostBuyingSulphuricCoalDirect,
      totalCostCraftingFromEnchantedMaterials,
      totalCostCraftingFromRawMaterials,
      availableRoutes, cheapestRoute,
      pSC, pEC, pES, pRC, pRS, pDist, pBlock,
    };
  }, [
    crudeGabagoolOwned, veryCrudeGabagoolOwned, distillatesOwned, infernoFuelBlocksOwned, numberOfMinions,
    priceSulphuricCoal, priceEnchantedCoal, priceEnchantedSulphur,
    priceRawCoal, priceRawSulphur, priceGabagoolDistillate, priceInfernoFuelBlock,
  ]);

  // ── STYLES ──
  const inputStyle = {
    background: "rgba(20,10,5,0.8)",
    border: "1px solid rgba(255,106,0,0.28)",
    borderRadius: 8, color: "#ffcfa0",
    fontFamily: "'Courier New', monospace",
    fontSize: 13, padding: "8px 11px",
    width: "100%", outline: "none", boxSizing: "border-box",
  };
  const priceInputStyle = { ...inputStyle, borderColor: "rgba(255,200,80,0.22)", fontSize: 12 };
  const lbl = { color: "#a09080", fontSize: 11, marginBottom: 3, display: "block", letterSpacing: "0.04em" };

  const fetchButtonStyle = {
    display: "flex", alignItems: "center", gap: 8,
    background: fetchStatus === "ok" ? "rgba(80,255,80,0.08)" : "rgba(96,165,250,0.08)",
    border: fetchStatus === "ok" ? "1px solid rgba(80,255,80,0.3)" : "1px solid rgba(96,165,250,0.28)",
    color: fetchStatus === "ok" ? "#72ff72" : "#93c5fd",
    borderRadius: 10, padding: "10px 18px",
    fontSize: 13, fontWeight: 600, cursor: fetchStatus === "loading" ? "not-allowed" : "pointer",
    opacity: fetchStatus === "loading" ? 0.6 : 1,
    transition: "all 0.15s", fontFamily: "inherit",
    whiteSpace: "nowrap",
  };

  return (
    <div style={{
      minHeight: "100vh",
      background: "radial-gradient(ellipse at top, #180700 0%, #0c0300 55%, #000 100%)",
      padding: "28px 14px",
      fontFamily: "'Georgia', serif",
    }}>
      <div style={{
        position: "fixed", top: 0, left: "50%", transform: "translateX(-50%)",
        width: 700, height: 280,
        background: "radial-gradient(ellipse, rgba(255,70,0,0.06) 0%, transparent 70%)",
        pointerEvents: "none",
      }} />

      <div style={{ maxWidth: 620, margin: "0 auto", position: "relative" }}>

        {/* ── HEADER ── */}
        <div style={{ textAlign: "center", marginBottom: 24 }}>
          <div style={{ fontSize: 32 }}>🔥</div>
          <h1 style={{
            color: "#ff6a00", fontWeight: 900, fontSize: 20,
            letterSpacing: "0.12em", textTransform: "uppercase", margin: "4px 0 0",
            textShadow: "0 0 25px rgba(255,106,0,0.45)",
          }}>Inferno Fuel Calculator</h1>
          <p style={{ color: "#7a6040", fontSize: 11, marginTop: 4, letterSpacing: "0.05em" }}>
            LEGENDARY (×20) · GABAGOOL DISTILLATE · 10 MINION SETUP
          </p>
        </div>

        {/* ── SETUP & STOCK ── */}
        <Card>
          <CardHeader icon="⚙️" title="Setup & Gabagool Stock" />
          <div style={{ marginBottom: 12 }}>
            <label style={lbl}>Number of Inferno Minions to fuel daily</label>
            <input type="number" min="1" max="25" value={numberOfMinions}
              onChange={e => setNumberOfMinions(e.target.value)} style={inputStyle} />
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
            <div>
              <label style={lbl}>Crude Gabagool owned</label>
              <input type="number" min="0" placeholder="0" value={crudeGabagoolOwned}
                onChange={e => setCrudeGabagoolOwned(e.target.value)} style={inputStyle} />
            </div>
            <div>
              <label style={lbl}>Very Crude Gabagool owned</label>
              <input type="number" min="0" placeholder="0" value={veryCrudeGabagoolOwned}
                onChange={e => setVeryCrudeGabagoolOwned(e.target.value)} style={inputStyle} />
              <div style={{ color: "#504030", fontSize: 10, marginTop: 2 }}>
                ≡ {fmt((parseInt(veryCrudeGabagoolOwned) || 0) * CRUDE_GABAGOOL_PER_VERY_CRUDE_GABAGOOL)} Crude Gabagool
              </div>
            </div>
            <div>
              <label style={lbl}>Gabagool Distillates owned</label>
              <input type="number" min="0" placeholder="leave blank = buying all" value={distillatesOwned}
                onChange={e => setDistillatesOwned(e.target.value)} style={inputStyle} />
            </div>
            <div>
              <label style={lbl}>Inferno Fuel Blocks owned</label>
              <input type="number" min="0" placeholder="leave blank = buying all" value={infernoFuelBlocksOwned}
                onChange={e => setInfernoFuelBlocksOwned(e.target.value)} style={inputStyle} />
            </div>
          </div>
        </Card>

        {/* ── BAZAAR PRICES ── */}
        <Card accent="rgba(255,200,80,0.18)">
          <CardHeader icon="💰" title="Prices" accent="rgba(255,200,80,0.18)" />

          {/* Fetch button row */}
          <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 16, flexWrap: "wrap" }}>
            <button
              style={fetchButtonStyle}
              disabled={fetchStatus === "loading"}
              onClick={fetchLivePrices}
            >
              {fetchStatus === "loading" ? "⟳ Fetching…" : "⟳ Fetch Live Bazaar Prices"}
            </button>
            {fetchMessage && (
              <span style={{
                fontSize: 12,
                color: fetchStatus === "ok" ? "#72ff72" : fetchStatus === "error" ? "#ff7070" : "#ffcc55",
              }}>
                {fetchMessage}
              </span>
            )}
          </div>
          {lastFetchTime && (
            <div style={{ fontSize: 10, color: "#554030", marginBottom: 12 }}>
              Last fetched at {lastFetchTime} · Crude Gabagool and Very Crude Gabagool are produced by your minions, not bought · Inferno Fuel Block is Bits Shop only (enter coin equivalent manually)
            </div>
          )}

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 9 }}>
            {[
              ["Sulphuric Coal (buyorder)", priceSulphuricCoal, setPriceSulphuricCoal, "fetched from Bazaar"],
              ["Enchanted Coal (buyorder)", priceEnchantedCoal, setPriceEnchantedCoal, "fetched from Bazaar"],
              ["Enchanted Sulphur (buyorder)", priceEnchantedSulphur, setPriceEnchantedSulphur, "fetched from Bazaar"],
              ["Raw Coal (buyorder)", priceRawCoal, setPriceRawCoal, "fetched from Bazaar"],
              ["Raw Sulphur (buyorder)", priceRawSulphur, setPriceRawSulphur, "fetched from Bazaar"],
              ["Gabagool Distillate (buyorder)", priceGabagoolDistillate, setPriceGabagoolDistillate, "fetched from Bazaar"],
              ["Inferno Fuel Block (coin value)", priceInfernoFuelBlock, setPriceInfernoFuelBlock, "Bits Shop — enter manually"],
            ].map(([label, val, setter, hint]) => (
              <div key={label}>
                <label style={lbl}>{label}</label>
                <input type="number" min="0" placeholder="0" value={val}
                  onChange={e => setter(e.target.value)} style={priceInputStyle} />
                {hint && <div style={{ color: "#453525", fontSize: 9, marginTop: 1 }}>{hint}</div>}
              </div>
            ))}
          </div>
        </Card>

        {/* ── RESULTS ── */}
        <Card accent={calc.canFuelAllMinions ? "rgba(80,255,80,0.22)" : "rgba(255,106,0,0.3)"}>
          <div style={{ textAlign: "center", marginBottom: 14 }}>
            <div style={{ fontSize: 24 }}>{calc.canFuelAllMinions ? "✅" : "⚠️"}</div>
            <div style={{
              color: calc.canFuelAllMinions ? "#72ff72" : "#ff9f4a",
              fontWeight: 700, fontSize: 14, letterSpacing: "0.06em", textTransform: "uppercase",
            }}>
              {calc.canFuelAllMinions
                ? `Can fuel all ${calc.target} minions!`
                : `Can fuel ${calc.maxFuelsCraftable} / ${calc.target} minions`}
            </div>
          </div>

          <SectionHeader icon="🔢">Gabagool Chain</SectionHeader>
          <InfoRow label="Crude Gabagool owned" value={fmt(calc.crudeOwned)} />
          <InfoRow label="Very Crude Gabagool owned" value={fmt(calc.veryCrudeOwned)} sub={`= ${fmt(calc.crudeFromVeryCrude)} Crude Gabagool`} />
          <InfoRow label="Total Crude Gabagool equivalent" value={fmt(calc.totalCrudeEquivalent)} highlight />
          <InfoRow label="Crude Gabagool needed per Hypergolic Gabagool" value={fmt(CRUDE_GABAGOOL_PER_HYPERGOLIC)} />
          <InfoRow label="Hypergolic Gabagool you can craft" value={fmt(calc.hypergolicCraftable)} highlight />
          <InfoRow label="Legendary Inferno Minion Fuels you can make" value={fmt(calc.maxFuelsCraftable)} highlight />

          {calc.shortfall > 0 && (
            <>
              <SectionHeader icon="🛒">What You Still Need to Buy</SectionHeader>
              <InfoRow label="Additional fuels needed" value={fmt(calc.shortfall)} highlight />
              <InfoRow label="Extra Crude Gabagool needed" value={fmt(calc.shortfall * CRUDE_GABAGOOL_PER_HYPERGOLIC)} />
              {!calc.distEntered && (
                <InfoRow label="Gabagool Distillates needed (total for all minions)" value={fmt(calc.totalDistillatesNeeded)} />
              )}
              {calc.distEntered && calc.extraDistillatesNeeded > 0 && (
                <InfoRow label="More Gabagool Distillates needed" value={fmt(calc.extraDistillatesNeeded)} />
              )}
              {!calc.blocksEntered && (
                <InfoRow label="Inferno Fuel Blocks needed (total)" value={fmt(calc.totalFuelBlocksNeeded)} sub={`${calc.totalFuelBlocksNeeded * INFERNO_FUEL_BLOCK_BITS_COST} Bits`} />
              )}
              {calc.blocksEntered && calc.extraFuelBlocksNeeded > 0 && (
                <InfoRow label="More Inferno Fuel Blocks needed" value={fmt(calc.extraFuelBlocksNeeded)} sub={`${calc.extraFuelBlocksNeeded * INFERNO_FUEL_BLOCK_BITS_COST} Bits`} />
              )}
            </>
          )}

          {calc.canFuelAllMinions && (calc.extraDistillatesNeeded > 0 || calc.extraFuelBlocksNeeded > 0) && (
            <>
              <SectionHeader icon="🛒">Other Items to Buy</SectionHeader>
              {calc.extraDistillatesNeeded > 0 && (
                <InfoRow label="Gabagool Distillates" value={fmt(calc.extraDistillatesNeeded)} />
              )}
              {calc.extraFuelBlocksNeeded > 0 && (
                <InfoRow label="Inferno Fuel Blocks" value={fmt(calc.extraFuelBlocksNeeded)} sub={`${calc.extraFuelBlocksNeeded * INFERNO_FUEL_BLOCK_BITS_COST} Bits`} />
              )}
            </>
          )}
        </Card>

        {/* ── SULPHURIC COAL FULL BREAKDOWN ── */}
        <Card accent="rgba(255,200,60,0.22)">
          <CardHeader icon="⚗️" title="Sulphuric Coal — Full Breakdown" accent="rgba(255,200,60,0.22)" />

          <InfoRow
            label={`Sulphuric Coal needed (${calc.target} fuels × ${SULPHURIC_COAL_PER_HYPERGOLIC} per fuel)`}
            value={fmt(calc.totalSulphuricCoalNeeded)}
            highlight
          />
          <div style={{ fontSize: 10, color: "#554030", marginBottom: 10, marginTop: 2, paddingLeft: 12 }}>
            Each Hypergolic Gabagool requires 301 Sulphuric Coal: 288 for the Fuel Gabagool crafting step + 12 for Heavy Gabagool + 1 for Hypergolic
          </div>

          <Divider />

          {/* Intermediate layer */}
          <div style={{ color: "#7a6040", fontSize: 11, textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 6 }}>
            Crafting materials (intermediate layer)
          </div>
          <div style={{ fontSize: 10, color: "#554030", marginBottom: 8, paddingLeft: 4 }}>
            1 Sulphuric Coal craft yields 4 Sulphuric Coal using 4 Enchanted Coal + 1 Enchanted Sulphur
          </div>
          <InfoRow
            label="Enchanted Coal required"
            value={fmtDec(calc.totalEnchantedCoalNeeded)}
            sub={`${ENCHANTED_COAL_PER_SULPHURIC_COAL} per Sulphuric Coal (4 per craft ÷ 4 output)`}
          />
          <InfoRow
            label="Enchanted Sulphur required"
            value={fmtDec(calc.totalEnchantedSulphurNeeded, 1)}
            sub={`${ENCHANTED_SULPHUR_PER_SULPHURIC_COAL} per Sulphuric Coal (1 per craft ÷ 4 output)`}
          />

          <Divider />

          {/* Raw layer */}
          <div style={{ color: "#7a6040", fontSize: 11, textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 6 }}>
            Or in raw base materials
          </div>
          <div style={{ fontSize: 10, color: "#554030", marginBottom: 8, paddingLeft: 4 }}>
            1 Enchanted Coal = 160 raw Coal · 1 Enchanted Sulphur = 160 raw Sulphur
          </div>
          <InfoRow label="Raw Coal" value={fmt(calc.totalRawCoalNeeded)}
            sub={`${RAW_COAL_PER_SULPHURIC_COAL} per Sulphuric Coal (160 × 1 Enchanted Coal)`} muted />
          <InfoRow label="Raw Sulphur" value={fmtDec(calc.totalRawSulphurNeeded)}
            sub={`${RAW_SULPHUR_PER_SULPHURIC_COAL} per Sulphuric Coal (160 × 0.25 Enchanted Sulphur)`} muted />

          {/* Cost comparison for Sulphuric Coal */}
          {(calc.pSC > 0 || calc.pEC > 0 || calc.pES > 0 || calc.pRC > 0 || calc.pRS > 0) && (
            <>
              <Divider />
              <div style={{ color: "#7a6040", fontSize: 11, textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 8 }}>
                Cost comparison — Sulphuric Coal only
              </div>
              {[
                calc.pSC > 0 && { label: "Buy Sulphuric Coal directly", cost: calc.costSulphuricCoalDirect },
                (calc.pEC > 0 || calc.pES > 0) && { label: "Craft from Enchanted Coal + Enchanted Sulphur", cost: calc.costSulphuricCoalFromEnchanted },
                (calc.pRC > 0 || calc.pRS > 0) && { label: "Craft from raw Coal + raw Sulphur", cost: calc.costSulphuricCoalFromRaw },
              ].filter(Boolean).sort((a, b) => a.cost - b.cost).map((route, i) => (
                <div key={route.label} style={{
                  display: "flex", justifyContent: "space-between", alignItems: "center",
                  padding: "6px 10px", borderRadius: 7, marginBottom: 4,
                  background: i === 0 ? "rgba(80,255,80,0.07)" : "rgba(255,255,255,0.02)",
                  border: i === 0 ? "1px solid rgba(80,255,80,0.15)" : "1px solid rgba(255,255,255,0.04)",
                }}>
                  <span style={{ color: i === 0 ? "#72ff72" : "#9a8a70", fontSize: 12 }}>
                    {i === 0 ? "✅ " : ""}{route.label}
                  </span>
                  <span style={{ color: i === 0 ? "#72ff72" : "#8a7a60", fontFamily: "monospace", fontWeight: 700, fontSize: 12 }}>
                    {fmt(route.cost)} coins
                  </span>
                </div>
              ))}
            </>
          )}
        </Card>

        {/* ── TOTAL DAILY COST ── */}
        {calc.availableRoutes.length > 0 && (
          <Card>
            <CardHeader icon="💸" title="Total Daily Cost (all fuels)" />

            {/* Sort all routes by total cost */}
            {[
              calc.pSC > 0 && {
                label: "Route: Buy Sulphuric Coal directly",
                scCost: calc.costSulphuricCoalDirect,
                total: calc.totalCostBuyingSulphuricCoalDirect,
              },
              (calc.pEC > 0 || calc.pES > 0) && {
                label: "Route: Craft Sulphuric Coal from Enchanted materials",
                scCost: calc.costSulphuricCoalFromEnchanted,
                total: calc.totalCostCraftingFromEnchantedMaterials,
              },
              (calc.pRC > 0 || calc.pRS > 0) && {
                label: "Route: Craft Sulphuric Coal from raw materials",
                scCost: calc.costSulphuricCoalFromRaw,
                total: calc.totalCostCraftingFromRawMaterials,
              },
            ].filter(Boolean).sort((a, b) => a.total - b.total).map((route, i) => (
              <div key={route.label} style={{
                padding: "11px 14px", borderRadius: 10, marginBottom: 8,
                background: i === 0 ? "rgba(255,106,0,0.1)" : "rgba(255,255,255,0.02)",
                border: i === 0 ? "1px solid rgba(255,106,0,0.3)" : "1px solid rgba(255,255,255,0.05)",
              }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                  <div>
                    <div style={{ color: i === 0 ? "#ffb347" : "#8a7a60", fontSize: 13, fontWeight: 700 }}>
                      {i === 0 ? "🏆 " : ""}{route.label}
                    </div>
                    <div style={{ color: "#554030", fontSize: 10, marginTop: 3 }}>
                      Sulphuric Coal: {fmt(route.scCost)} coins
                      {calc.costDistillates > 0 ? `  +  Distillates: ${fmt(calc.costDistillates)} coins` : ""}
                      {calc.costFuelBlocks > 0 ? `  +  Fuel Blocks: ${fmt(calc.costFuelBlocks)} coins` : ""}
                    </div>
                  </div>
                  <span style={{
                    color: i === 0 ? "#ffcf80" : "#7a6a50",
                    fontFamily: "monospace", fontWeight: 900,
                    fontSize: i === 0 ? 18 : 14, marginLeft: 12,
                  }}>
                    {fmt(route.total)} coins
                  </span>
                </div>
              </div>
            ))}

            {calc.pDist > 0 && !calc.distEntered && (
              <InfoRow label={`Gabagool Distillates cost (${fmt(calc.extraDistillatesNeeded)} × ${fmt(calc.pDist)} coins)`}
                value={`${fmt(calc.costDistillates)} coins`} />
            )}
            {calc.pBlock > 0 && !calc.blocksEntered && (
              <InfoRow label={`Inferno Fuel Blocks cost (${fmt(calc.extraFuelBlocksNeeded)} × ${fmt(calc.pBlock)} coins)`}
                value={`${fmt(calc.costFuelBlocks)} coins`} />
            )}
          </Card>
        )}

        {/* ── RECIPE REMINDER ── */}
        <div style={{
          padding: "11px 15px", background: "rgba(0,0,0,0.3)",
          borderRadius: 9, border: "1px solid rgba(255,255,255,0.04)",
          fontSize: 10, color: "#503820", lineHeight: 2.0, marginBottom: 20,
        }}>
          <span style={{ color: "#7a5030", fontWeight: 700 }}>📜 Full Craft Chain: </span>
          24 Crude Gabagool + 1 Sulphuric Coal → 1 Fuel Gabagool<br />
          24 Fuel Gabagool + 1 Sulphuric Coal → 1 Heavy Gabagool<br />
          12 Heavy Gabagool + 1 Sulphuric Coal → 1 Hypergolic Gabagool<br />
          1 Hypergolic Gabagool = 6,912 Crude Gabagool + 301 Sulphuric Coal<br />
          4 Enchanted Coal + 1 Enchanted Sulphur → 4 Sulphuric Coal (so 1 SC = 1 Enchanted Coal + 0.25 Enchanted Sulphur = 160 raw Coal + 40 raw Sulphur)<br />
          6 Gabagool Distillates + 2 Inferno Fuel Blocks + 1 Hypergolic Gabagool → 1 Legendary Inferno Minion Fuel (24h, ×20 speed)
        </div>

      </div>
    </div>
  );
}
/* --- YOUR ENTIRE CODE END --- */


// ===== MOUNT =====
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<InfernoFuelCalculator />);

  </script>
