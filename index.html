<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Inferno Fuel Calculator</title>
</head>
<body style="margin:0; font-family: Georgia, serif; background: radial-gradient(ellipse at top, #180700 0%, #0c0300 55%, #000 100%);">

<div id="app" style="max-width:620px;margin:0 auto;padding:20px;"></div>

<script>
// ================= CONSTANTS =================
const CRUDE_PER_FUEL = 24;
const FUEL_PER_HEAVY = 24;
const HEAVY_PER_HYPER = 12;

const CRUDE_PER_HYPER = CRUDE_PER_FUEL * FUEL_PER_HEAVY * HEAVY_PER_HYPER;
const SULPHUR_PER_HYPER = 301;

const DIST_PER_FUEL = 6;
const BLOCKS_PER_FUEL = 2;

// ================= STATE =================
let state = {
  crude: 0,
  veryCrude: 0,
  dist: "",
  blocks: "",
  minions: 10
};

// ================= UTILS =================
function fmt(n){
  return Math.floor(n).toLocaleString();
}

// ================= CALC =================
function calculate(){
  const crude = parseInt(state.crude)||0;
  const very = parseInt(state.veryCrude)||0;

  const crudeTotal = crude + very*192;
  const hyper = Math.floor(crudeTotal / CRUDE_PER_HYPER);

  const distLimit = state.dist === "" ? hyper : Math.floor(state.dist / DIST_PER_FUEL);
  const blockLimit = state.blocks === "" ? hyper : Math.floor(state.blocks / BLOCKS_PER_FUEL);

  const maxFuel = Math.min(hyper, distLimit, blockLimit);
  const shortfall = Math.max(0, state.minions - maxFuel);

  return { crudeTotal, hyper, maxFuel, shortfall };
}

// ================= UI =================
function render(){
  const calc = calculate();

  document.getElementById("app").innerHTML = `
    <div style="text-align:center;color:#ff6a00;">
      <h2>🔥 Inferno Fuel Calculator</h2>
    </div>

    <div style="background:#111;padding:15px;border-radius:10px;margin-bottom:10px;">
      <label>Minions</label><br>
      <input type="number" value="${state.minions}" onchange="update('minions',this.value)">
    </div>

    <div style="background:#111;padding:15px;border-radius:10px;margin-bottom:10px;">
      <label>Crude Gabagool</label><br>
      <input type="number" value="${state.crude}" onchange="update('crude',this.value)">

      <br><br>

      <label>Very Crude Gabagool</label><br>
      <input type="number" value="${state.veryCrude}" onchange="update('veryCrude',this.value)">
    </div>

    <div style="background:#111;padding:15px;border-radius:10px;margin-bottom:10px;">
      <label>Distillates (optional)</label><br>
      <input type="number" value="${state.dist}" onchange="update('dist',this.value)">

      <br><br>

      <label>Fuel Blocks (optional)</label><br>
      <input type="number" value="${state.blocks}" onchange="update('blocks',this.value)">
    </div>

    <div style="background:#111;padding:15px;border-radius:10px;color:#eee;">
      <h3>Results</h3>
      <p>Total Crude: ${fmt(calc.crudeTotal)}</p>
      <p>Hypergolic: ${fmt(calc.hyper)}</p>
      <p>Fuel Possible: ${fmt(calc.maxFuel)}</p>
      <p>Shortfall: ${fmt(calc.shortfall)}</p>
    </div>
  `;
}

// ================= UPDATE =================
function update(key, value){
  state[key] = value;
  render();
}

render();
</script>

</body>
</html>
